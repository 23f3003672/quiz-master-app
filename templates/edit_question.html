{% extends 'base.html' %}

{% block title %}Edit Subject- Quiz Master{% endblock %}

{% block content %}
    <h2>Edit Question</h2>
    <form method="POST">
        <input type="hidden" name="quiz_id" value="{{ question.quiz_id }}">
        <label for="text">Question:</label>
        <input type="text" name="text" value="{{ question.text }}" required>
        
        <label for="option_a">Option A:</label>
        <input type="text" name="option_a" value="{{ question.option_a }}" required>

        <label for="option_b">Option B:</label>
        <input type="text" name="option_b" value="{{ question.option_b }}" required>

        <label for="option_c">Option C:</label>
        <input type="text" name="option_c" value="{{ question.option_c }}" required>

        <label for="option_d">Option D:</label>
        <input type="text" name="option_d" value="{{ question.option_d }}" required>

        <label for="correct_option">Correct Option:</label>
        <select name="correct_option" required>
            <option value="A" {% if question.correct_option=="A" %} selected {% endif %}>A</option>

            <option value="B" {% if question.correct_option=="B" %} selected {% endif %}>B</option>

            <option value="C" {% if question.correct_option=="C" %} selected {% endif %}>C</option>

            <option value="D" {% if question.correct_option=="D" %} selected {% endif %}>D</option>
        </select>
      

        <button type="submit">Update Quiz</button>
    </form>
    <span style="margin-right: 20px;">
        <a href="{{ url_for('manage_questions',quiz_id=question.quiz.id) }}">Back to Manage Questions</a>

    </span>
   
    <a href="{{ url_for('admin_dashboard') }}">Back to Admin Dashboard</a>

{% endblock %}
